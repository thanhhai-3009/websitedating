<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Appointment Confirmation</title>
  </head>
  <body style="margin:0;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#0b1220;line-height:1.4;">
    <div style="max-width:680px;margin:0 auto;background:#ffffff;border:1px solid #e6e9ee;padding:20px;border-radius:8px;">
      <h1 style="font-size:20px;margin:0 0 8px;">Appointment Confirmation</h1>
      <p style="margin:0 0 12px;color:#55607a;">Hello {{recipientName}},</p>
      <p style="margin:0 0 12px;color:#334155;">Your appointment has been scheduled. Please find the details below.</p>

      <table role="presentation" style="width:100%;border-collapse:collapse;font-size:14px;color:#16324f;border:1px solid #e6e9ee;">
        <thead>
          <tr style="background:#f8fafc;">
            <th style="text-align:left;padding:8px;border-bottom:1px solid #e6e9ee;">Booking ID</th>
            <th style="text-align:left;padding:8px;border-bottom:1px solid #e6e9ee;">Date</th>
            <th style="text-align:left;padding:8px;border-bottom:1px solid #e6e9ee;">Time</th>
            <th style="text-align:left;padding:8px;border-bottom:1px solid #e6e9ee;">Service</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td style="padding:8px;border-top:1px solid #eef2f6;">{{bookingId}}</td>
            <td style="padding:8px;border-top:1px solid #eef2f6;">{{date}}</td>
            <td style="padding:8px;border-top:1px solid #eef2f6;">{{time}}</td>
            <td style="padding:8px;border-top:1px solid #eef2f6;">{{service}}</td>
          </tr>
        </tbody>
      </table>

      <p style="margin:16px 0 0;color:#667085;">Please open the app to view or update your appointment.</p>
      <p style="margin:16px 0 0;color:#334155;">Regards,<br/>Heartly Team</p>
    </div>
  </body>
</html>
